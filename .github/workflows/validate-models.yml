name: Validate Model Configs

on:
  pull_request:
    paths:
      - "models/**"
      - "scripts/community_models.py"
      - "scripts/validate_models.py"
  push:
    branches: [main]
    paths:
      - "models/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Validate model YAMLs
        run: python scripts/validate_models.py
